services:
  app:
    build: .
    container_name: php_app_container
    restart: always
    depends_on:
      - database
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_HOST: database
      DB_PORT: 3306
      DB_NAME: RSI
      DB_USER: rsi_user
      DB_PASSWORD: rsi_password

  database:
    image: mysql:8.0
    container_name: mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 753159
      MYSQL_DATABASE: RSI
      MYSQL_USER: rsi_user
      MYSQL_PASSWORD: rsi_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./RSI.sql:/docker-entrypoint-initdb.d/RSI.sql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin_container
    restart: always
    depends_on:
      - database
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: 753159
    ports:
      - "5050:80"

volumes:
  mysql_data: